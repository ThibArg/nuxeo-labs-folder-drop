<dom-module id="nuxeo-labs-folder-drop">
  <template>
    <style include="nuxeo-styles nuxeo-action-button-styles">
      :host {
        display: inline-block;
      }

      nuxeo-dialog {
        --nuxeo-dialog: {
          top: 50px;
          bottom: auto;
          width: 50%;
          max-width: 700px;
        };
      }

      #dropZone {
        min-height: 80px;
        border: 2px dashed var(--nuxeo-border, #aaa);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        margin: 16px 0;
        transition: border-color 0.2s, background-color 0.2s;
        background: var(--nuxeo-page-background, #fafafa);
      }

      #dropZone.dragover {
        border-color: var(--nuxeo-primary-color, #0066ff);
        background-color: var(--nuxeo-light-background, #e8f0fe);
      }

      #dropZone iron-icon {
        --iron-icon-height: 48px;
        --iron-icon-width: 48px;
        color: var(--nuxeo-text-light, #939caa);
        margin-bottom: 8px;
      }

      .drop-label {
        color: var(--nuxeo-text-light, #939caa);
        font-size: 14px;
      }

      .progress-section {
        margin: 16px 0;
      }

      .progress-label {
        font-size: 13px;
        color: var(--nuxeo-text-default, #3a3a54);
        margin-bottom: 4px;
      }

      paper-progress {
        width: 100%;
        --paper-progress-active-color: var(--nuxeo-primary-color, #0066ff);
      }

      .tree-preview {
        max-height: 250px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 12px;
        background: var(--nuxeo-box, #fff);
        border: 1px solid var(--nuxeo-border, #e3e3e3);
        border-radius: 4px;
        padding: 8px 12px;
        margin: 8px 0;
        white-space: pre;
        width: 100%;
        box-sizing: border-box;
      }

      .error-message {
        color: var(--nuxeo-warn-text, #d32f2f);
        font-size: 13px;
        margin: 8px 0;
      }

      .success-message {
        color: var(--nuxeo-validated, #42a100);
        font-size: 13px;
        margin: 8px 0;
      }

      .warning-message {
        color: var(--nuxeo-warn-text, #f57c00);
        font-size: 13px;
        margin: 8px 0;
        padding: 8px 12px;
        background: #fff3e0;
        border: 1px solid #ffe0b2;
        border-radius: 4px;
      }

      .summary {
        font-size: 13px;
        color: var(--nuxeo-text-default, #3a3a54);
        margin: 4px 0;
      }

      .phase-completed {
        font-size: 12px;
        color: var(--nuxeo-validated, #42a100);
        margin: 4px 0;
      }

      .phase-completed iron-icon {
        --iron-icon-height: 16px;
        --iron-icon-width: 16px;
        color: var(--nuxeo-validated, #42a100);
        margin-right: 4px;
      }

      .current-file-label {
        margin-top: 8px;
        font-style: italic;
        color: var(--nuxeo-text-light, #939caa);
      }

      .in-flight-list {
        max-height: 150px;
        overflow-y: auto;
        border: 1px solid var(--nuxeo-border, #e3e3e3);
        border-radius: 4px;
        padding: 4px 8px;
        margin-top: 8px;
        font-size: 12px;
      }

      .in-flight-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 2px 0;
      }

      .in-flight-item .file-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .in-flight-item .file-size {
        color: var(--nuxeo-text-light, #939caa);
        white-space: nowrap;
      }

      .in-flight-item paper-progress {
        width: 80px;
        flex-shrink: 0;
      }

      .in-flight-item .pct {
        width: 36px;
        text-align: right;
        white-space: nowrap;
        color: var(--nuxeo-text-light, #939caa);
      }
    </style>

    <nuxeo-connection id="nx"></nuxeo-connection>
    <nuxeo-operation id="resolveTypesOp" op="FolderDrop.ResolveTypes"></nuxeo-operation>

    <!-- The action button -->
    <paper-icon-button id="dropFolderBtn" icon="icons:folder" on-tap="_openDialog" noink></paper-icon-button>
    <span class="label" hidden$="[[!showLabel]]">[[i18n('folderDrop.action.tooltip')]]</span>
    <nuxeo-tooltip for="dropFolderBtn">[[i18n('folderDrop.action.tooltip')]]</nuxeo-tooltip>

    <!-- The dialog -->
    <nuxeo-dialog id="dialog" with-backdrop no-auto-focus modal>
      <h2>[[i18n('folderDrop.dialog.title')]]</h2>

      <!-- Drop zone (visible before upload starts and config is valid) -->
      <template is="dom-if" if="[[_showDropZone(_uploading, _configValid)]]">
        <div id="dropZone"
             on-dragover="_onDragOver"
             on-dragleave="_onDragLeave"
             on-drop="_onDrop">
          <iron-icon icon="icons:cloud-upload"></iron-icon>
          <div class="drop-label">[[i18n('folderDrop.dialog.dropLabel')]]</div>
        </div>
      </template>

      <!-- Tree preview (after drop) -->
      <template is="dom-if" if="[[_hasTree]]">
        <div class="summary">
          [[_treeSummary]]
        </div>
        <div class="tree-preview">[[_treePreview]]</div>
      </template>

      <!-- Warning message (e.g., duplicate items) -->
      <template is="dom-if" if="[[_warningMessage]]">
        <div class="warning-message">
          <div>[[_warningMessage]]</div>
          <div>[[i18n('folderDrop.warning.duplicates.hint')]]</div>
        </div>
      </template>

      <!-- Phase: Upload files (default / sequential mode) -->
      <template is="dom-if" if="[[_showUploadProgress]]">
        <div class="progress-section">
          <div class="progress-label">[[_uploadProgressLabel]]</div>
          <paper-progress value="[[_uploadProgressValue]]" max="[[_uploadProgressMax]]"></paper-progress>
          <!-- Current file being uploaded (sequential mode) -->
          <template is="dom-if" if="[[_currentFileName]]">
            <div class="progress-label current-file-label">[[i18n('folderDrop.progress.uploading.file', _currentFileName, _currentFileSize)]]</div>
            <template is="dom-if" if="[[_showFileIndeterminate]]">
              <paper-progress indeterminate></paper-progress>
            </template>
          </template>
          <!-- In-flight files list (S3 parallel mode) -->
          <template is="dom-if" if="[[_hasInFlightFiles]]">
            <div class="in-flight-list">
              <template is="dom-repeat" items="[[_inFlightFiles]]" as="inf">
                <div class="in-flight-item">
                  <span class="file-name">[[inf.name]]</span>
                  <span class="file-size">[[inf.sizeLabel]]</span>
                  <paper-progress value="[[inf.pct]]" max="100"></paper-progress>
                  <span class="pct">[[inf.pct]]%</span>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- Phase: Upload complete checkmark -->
      <template is="dom-if" if="[[_uploadDone]]">
        <div class="phase-completed">
          <iron-icon icon="icons:check"></iron-icon>[[i18n('folderDrop.phase.uploadDone')]]
        </div>
      </template>

      <!-- Phase: Resolving types (only with callback chain) -->
      <template is="dom-if" if="[[_showResolvingProgress]]">
        <div class="progress-section">
          <div class="progress-label">[[i18n('folderDrop.progress.resolving')]]</div>
          <paper-progress indeterminate></paper-progress>
        </div>
      </template>

      <!-- Phase: Resolving complete checkmark -->
      <template is="dom-if" if="[[_resolvingDone]]">
        <div class="phase-completed">
          <iron-icon icon="icons:check"></iron-icon>[[i18n('folderDrop.phase.resolvingDone')]]
        </div>
      </template>

      <!-- Phase: Creating documents -->
      <template is="dom-if" if="[[_showImportProgress]]">
        <div class="progress-section">
          <div class="progress-label">[[_importProgressLabel]]</div>
          <paper-progress value="[[_importProgressValue]]" max="[[_importProgressMax]]"></paper-progress>
        </div>
      </template>

      <!-- Error message -->
      <template is="dom-if" if="[[_errorMessage]]">
        <div class="error-message">[[_errorMessage]]</div>
      </template>

      <!-- Success message -->
      <template is="dom-if" if="[[_successMessage]]">
        <div class="success-message">[[_successMessage]]</div>
      </template>

      <!-- Buttons -->
      <div class="buttons">
        <!-- Cancel / Close -->
        <paper-button on-tap="_close" disabled="[[_uploading]]">
          [[_closeButtonLabel]]
        </paper-button>

        <!-- Upload button -->
        <paper-button class="primary" on-tap="_startUpload" disabled="[[!_canUpload]]" hidden="[[!_hasTree]]">
          [[i18n('folderDrop.dialog.upload')]]
        </paper-button>
      </div>
    </nuxeo-dialog>
  </template>

  <script>
    Polymer({
      is: 'nuxeo-labs-folder-drop',

      behaviors: [Nuxeo.FormatBehavior],

      properties: {
        /** The current Folderish document */
        document: Object,

        showLabel: {
          type: Boolean,
          value: false
        },

        /** Flat list of all items in the tree */
        _items: {
          type: Array,
          value: function() { return []; }
        },

        /** Files (actual File objects) indexed by their position in _items */
        _fileObjects: {
          type: Array,
          value: function() { return []; }
        },

        _hasTree: {
          type: Boolean,
          value: false
        },

        _treePreview: {
          type: String,
          value: ''
        },

        _treeSummary: {
          type: String,
          value: ''
        },

        /** True once Upload is clicked, stays true until done/error */
        _uploading: {
          type: Boolean,
          value: false
        },

        /** Show "Upload" button */
        _canUpload: {
          type: Boolean,
          value: false
        },

        // --- Upload phase ---
        _showUploadProgress: {
          type: Boolean,
          value: false
        },

        _uploadProgressLabel: {
          type: String,
          value: ''
        },

        _uploadProgressValue: {
          type: Number,
          value: 0
        },

        _uploadProgressMax: {
          type: Number,
          value: 100
        },

        /** Name of the file currently being uploaded */
        _currentFileName: {
          type: String,
          value: ''
        },

        /** Formatted size of the file currently being uploaded */
        _currentFileSize: {
          type: String,
          value: ''
        },

        /** Show indeterminate bar for large files (> 10 MB) */
        _showFileIndeterminate: {
          type: Boolean,
          value: false
        },

        _uploadDone: {
          type: Boolean,
          value: false
        },

        // --- Resolving phase (callback chain only) ---
        _showResolvingProgress: {
          type: Boolean,
          value: false
        },

        _resolvingDone: {
          type: Boolean,
          value: false
        },

        // --- Import / document creation phase ---
        _showImportProgress: {
          type: Boolean,
          value: false
        },

        _importProgressLabel: {
          type: String,
          value: ''
        },

        _importProgressValue: {
          type: Number,
          value: 0
        },

        _importProgressMax: {
          type: Number,
          value: 100
        },

        _errorMessage: {
          type: String,
          value: ''
        },

        _warningMessage: {
          type: String,
          value: ''
        },

        _successMessage: {
          type: String,
          value: ''
        },

        _closeButtonLabel: {
          type: String,
          computed: '_computeCloseLabel(_successMessage, _errorMessage, _hasTree)'
        },

        /** Whether S3 direct upload is available */
        _useS3: {
          type: Boolean,
          value: false
        },

        /** In-flight file entries for S3 parallel mode */
        _inFlightFiles: {
          type: Array,
          value: function() { return []; }
        },

        /** Whether we have in-flight files to show */
        _hasInFlightFiles: {
          type: Boolean,
          value: false
        },

        /** Total bytes to upload (for S3 aggregate progress) */
        _totalBytes: {
          type: Number,
          value: 0
        },

        /** Bytes uploaded so far (for S3 aggregate progress) */
        _uploadedBytes: {
          type: Number,
          value: 0
        },

        /** Whether the configuration is valid */
        _configValid: {
          type: Boolean,
          value: true
        },

        /** Max number of files allowed (from config) */
        _maxFiles: {
          type: Number,
          value: 500
        },

        /** Max total size in bytes allowed (from config) */
        _maxTotalSizeInBytes: {
          type: Number,
          value: 2147483648
        },

        /** Whether to filter hidden files (names starting with '.') */
        _filterHiddenFiles: {
          type: Boolean,
          value: true
        },

        /** Compiled RegExp objects for MIME type deny patterns */
        _denyPatterns: {
          type: Array,
          value: function() { return []; }
        }
      },

      _computeCloseLabel: function(_successMessage, _errorMessage, _hasTree) {
        if (_successMessage || _errorMessage) {
          return this.i18n('command.close');
        }
        if (_hasTree) {
          return this.i18n('folderDrop.dialog.cancel');
        }
        return this.i18n('command.close');
      },

      _openDialog: function() {
        if (this._uploading) {
          return;
        }
        this._reset();
        this._validateConfig();
        this.$.dialog.open();
      },

      _validateConfig: function() {
        var config = Nuxeo.UI && Nuxeo.UI.config;
        var rawMaxFiles = config && config.get ? config.get('folderDrop.maxFiles', '500') : '500';
        var rawMaxSize = config && config.get ? config.get('folderDrop.maxTotalSizeInBytes', '2147483648') : '2147483648';

        var maxFiles = parseInt(rawMaxFiles, 10);
        var maxSize = parseInt(rawMaxSize, 10);

        if (isNaN(maxFiles) || maxFiles <= 0 || isNaN(maxSize) || maxSize <= 0) {
          this._configValid = false;
          this._errorMessage = this.i18n('folderDrop.error.invalidConfig');
          return;
        }

        this._maxFiles = maxFiles;
        this._maxTotalSizeInBytes = maxSize;

        // Filter hidden files config
        var rawFilterHidden = config && config.get ? config.get('folderDrop.filterHiddenFiles', 'true') : 'true';
        this._filterHiddenFiles = rawFilterHidden !== 'false';

        // MIME type deny patterns
        var rawDenyPatterns = config && config.get ? config.get('folderDrop.mimeTypeDenyPatterns', '') : '';
        this._denyPatterns = [];
        if (rawDenyPatterns) {
          var parts = rawDenyPatterns.split(',');
          for (var i = 0; i < parts.length; i++) {
            var trimmed = parts[i].trim();
            if (trimmed) {
              try {
                this._denyPatterns.push(new RegExp('^' + trimmed + '$'));
              } catch (e) {
                console.error('[nuxeo-labs-folder-drop] Invalid MIME type deny pattern: ' + trimmed, e);
                this._configValid = false;
                this._errorMessage = this.i18n('folderDrop.error.invalidConfig');
                return;
              }
            }
          }
        }

        this._configValid = true;
      },

      _showDropZone: function(_uploading, _configValid) {
        return !_uploading && _configValid;
      },

      _reset: function() {
        this._items = [];
        this._fileObjects = [];
        this._hasTree = false;
        this._treePreview = '';
        this._treeSummary = '';
        this._uploading = false;
        this._canUpload = false;
        this._showUploadProgress = false;
        this._uploadProgressLabel = '';
        this._uploadProgressValue = 0;
        this._uploadProgressMax = 100;
        this._currentFileName = '';
        this._currentFileSize = '';
        this._showFileIndeterminate = false;
        this._uploadDone = false;
        this._showResolvingProgress = false;
        this._resolvingDone = false;
        this._showImportProgress = false;
        this._importProgressLabel = '';
        this._importProgressValue = 0;
        this._importProgressMax = 100;
        this._errorMessage = '';
        this._warningMessage = '';
        this._successMessage = '';
        this._useS3 = false;
        this._inFlightFiles = [];
        this._hasInFlightFiles = false;
        this._totalBytes = 0;
        this._uploadedBytes = 0;
        this._configValid = true;
        this._maxFiles = 500;
        this._maxTotalSizeInBytes = 2147483648;
        this._filterHiddenFiles = true;
        this._denyPatterns = [];
        this._uploader = null;
        this._batchId = null;
      },

      _close: function() {
        if (this._successMessage) {
          // Refresh the current view after successful import
          this.fire('document-updated');
          this.fire('navigate', { doc: this.document });
        }
        this.$.dialog.toggle();
      },

      _onDragOver: function(e) {
        e.preventDefault();
        e.stopPropagation();
        var dropZone = this.shadowRoot.querySelector('#dropZone');
        if (dropZone) {
          dropZone.classList.add('dragover');
        }
      },

      _onDragLeave: function(e) {
        e.preventDefault();
        e.stopPropagation();
        var dropZone = this.shadowRoot.querySelector('#dropZone');
        if (dropZone) {
          dropZone.classList.remove('dragover');
        }
      },

      _onDrop: function(e) {
        e.preventDefault();
        e.stopPropagation();
        var dropZone = this.shadowRoot.querySelector('#dropZone');
        if (dropZone) {
          dropZone.classList.remove('dragover');
        }

        this._errorMessage = '';
        this._warningMessage = '';
        this._successMessage = '';

        var dataTransfer = e.dataTransfer;
        if (!dataTransfer || !dataTransfer.items) {
          this._errorMessage = this.i18n('folderDrop.error.noItems');
          return;
        }

        var entries = [];
        for (var i = 0; i < dataTransfer.items.length; i++) {
          var item = dataTransfer.items[i];
          var entry = item.getAsEntry ? item.getAsEntry() :
                      (item.webkitGetAsEntry ? item.webkitGetAsEntry() : null);
          if (entry) {
            entries.push(entry);
          }
        }

        if (entries.length === 0) {
          this._errorMessage = this.i18n('folderDrop.error.noFolders');
          return;
        }

        // Check that at least one entry is a directory
        var hasDirectory = entries.some(function(e) { return e.isDirectory; });
        if (!hasDirectory) {
          this._errorMessage = this.i18n('folderDrop.error.noFolders');
          return;
        }

        var self = this;

        this._readEntriesRecursively(entries).then(function(result) {
          self._items = result.items;
          self._fileObjects = result.files;
          self._buildTreePreview();
          self._hasTree = true;

          // Check limits
          var fileCount = result.files.length;
          var totalSize = 0;
          result.files.forEach(function(f) { totalSize += f.size; });

          if (fileCount > self._maxFiles) {
            self._errorMessage = self.i18n('folderDrop.error.tooManyFiles',
              fileCount.toString(), self._maxFiles.toString());
            return;
          }
          if (totalSize > self._maxTotalSizeInBytes) {
            self._errorMessage = self.i18n('folderDrop.error.totalSizeTooLarge',
              self.formatSize(totalSize), self.formatSize(self._maxTotalSizeInBytes));
            return;
          }

          // Check for duplicate titles at the target level
          self._checkDuplicates().then(function() {
            self._canUpload = true;
          }).catch(function(err) {
            console.warn('[nuxeo-labs-folder-drop] Duplicate check failed:', err);
            // Don't block upload if the check fails — just skip the warning
            self._canUpload = true;
          });
        }).catch(function(err) {
          console.error('[nuxeo-labs-folder-drop] Failed to read folder contents:', err);
          self._errorMessage = self.i18n('folderDrop.error.readFailed');
        });
      },

      /**
       * Checks if any top-level dropped items have the same title as existing
       * children of the target document. Sets _warningMessage if duplicates found.
       */
      _checkDuplicates: function() {
        var self = this;

        // Collect names of top-level items (relativePath has no '/')
        var topLevelNames = [];
        this._items.forEach(function(item) {
          if (item.relativePath.indexOf('/') === -1) {
            topLevelNames.push(item.name);
          }
        });

        if (topLevelNames.length === 0) {
          return Promise.resolve();
        }

        // De-duplicate names
        var uniqueNames = [];
        var seen = {};
        topLevelNames.forEach(function(name) {
          if (!seen[name]) {
            seen[name] = true;
            uniqueNames.push(name);
          }
        });

        // Build NXQL IN clause with escaped single quotes
        var escaped = uniqueNames.map(function(n) {
          return "'" + n.replace(/'/g, "\\'") + "'";
        });
        var query = "SELECT * FROM Document WHERE ecm:parentId = '" + this.document.uid +
          "' AND dc:title IN (" + escaped.join(', ') +
          ") AND ecm:isVersion = 0 AND ecm:isProxy = 0 AND ecm:isTrashed = 0";

        return this.$.nx.request().then(function(request) {
          return request.path('/search/lang/NXQL/execute')
            .queryParams({ query: query, pageSize: 0 })
            .get();
        }).then(function(response) {
          if (response && response.resultsCount > 0) {
            // Collect matching titles
            var matchingTitles = [];
            var titleSeen = {};
            response.entries.forEach(function(entry) {
              var title = entry.properties && entry.properties['dc:title'];
              if (title && !titleSeen[title]) {
                titleSeen[title] = true;
                matchingTitles.push(title);
              }
            });
            if (matchingTitles.length > 0) {
              self._warningMessage = self.i18n('folderDrop.warning.duplicates',
                matchingTitles.join(', '));
            }
          }
        });
      },

      /**
       * Recursively reads all entries from the dropped FileSystemEntry objects.
       * Returns { items: [...flat list...], files: [...File objects...] }
       */
      _readEntriesRecursively: function(entries) {
        var items = [];
        var files = [];
        var self = this;

        function readEntry(entry, parentPath) {
          return new Promise(function(resolve, reject) {
            // Skip hidden files/folders (names starting with '.') if configured
            if (self._filterHiddenFiles && entry.name.charAt(0) === '.') {
              resolve();
              return;
            }
            // Reject entry names containing path traversal sequences
            if (entry.name === '..' || entry.name.indexOf('/') !== -1 || entry.name.indexOf('\\') !== -1) {
              reject(new Error('Invalid entry name: ' + entry.name));
              return;
            }
            var relativePath = parentPath ? parentPath + '/' + entry.name : entry.name;

            if (entry.isFile) {
              entry.file(function(file) {
                var fileMimeType = file.type || 'application/octet-stream';
                // Check MIME type deny patterns
                if (self._denyPatterns.length > 0) {
                  for (var p = 0; p < self._denyPatterns.length; p++) {
                    if (self._denyPatterns[p].test(fileMimeType)) {
                      // Skip denied file
                      resolve();
                      return;
                    }
                  }
                }
                var fileIndex = files.length;
                files.push(file);
                items.push({
                  name: entry.name,
                  relativePath: relativePath,
                  isFolder: false,
                  mimeType: fileMimeType,
                  size: file.size,
                  fileIndex: fileIndex
                });
                resolve();
              }, reject);
            } else if (entry.isDirectory) {
              items.push({
                name: entry.name,
                relativePath: relativePath,
                isFolder: true,
                mimeType: '',
                size: 0
              });

              var reader = entry.createReader();
              self._readAllDirectoryEntries(reader).then(function(childEntries) {
                var promises = childEntries.map(function(child) {
                  return readEntry(child, relativePath);
                });
                return Promise.all(promises);
              }).then(resolve).catch(reject);
            } else {
              resolve();
            }
          });
        }

        var promises = entries.map(function(entry) {
          return readEntry(entry, '');
        });

        return Promise.all(promises).then(function() {
          return { items: items, files: files };
        });
      },

      /**
       * Reads all entries from a DirectoryReader, handling the batch-reading behavior
       * where readEntries() may return partial results.
       */
      _readAllDirectoryEntries: function(reader) {
        var allEntries = [];

        function readBatch() {
          return new Promise(function(resolve, reject) {
            reader.readEntries(function(entries) {
              if (entries.length === 0) {
                resolve(allEntries);
              } else {
                allEntries = allEntries.concat(Array.from(entries));
                readBatch().then(resolve).catch(reject);
              }
            }, reject);
          });
        }

        return readBatch();
      },

      _buildTreePreview: function() {
        var folders = 0;
        var fileCount = 0;
        var totalSize = 0;
        var lines = [];

        // Sort items by relativePath for display
        var sorted = this._items.slice().sort(function(a, b) {
          return a.relativePath.localeCompare(b.relativePath);
        });

        var self = this;
        sorted.forEach(function(item) {
          var depth = item.relativePath.split('/').length - 1;
          var indent = '';
          for (var i = 0; i < depth; i++) {
            indent += '  ';
          }
          if (item.isFolder) {
            lines.push(indent + '\uD83D\uDCC1 ' + item.name);
            folders++;
          } else {
            lines.push(indent + '\uD83D\uDCC4 ' + item.name + '  (' + self.formatSize(item.size) + ')');
            fileCount++;
            totalSize += item.size || 0;
          }
        });

        this._treePreview = lines.join('\n');
        this._treeSummary = this.i18n('folderDrop.summary',
          folders.toString(), fileCount.toString(), this.formatSize(totalSize));
      },

      /**
       * Called when the user clicks "Upload".
       */
      _startUpload: function() {
        this._canUpload = false;
        this._uploading = true;
        this._errorMessage = '';
        this._batchId = null;

        var self = this;

        // Step 1: Upload all files to a batch
        this._uploadFiles().then(function(batchId) {
          self._batchId = batchId;
          self._showUploadProgress = false;
          self._uploadDone = true;

          // Step 2: Resolve types (always called; the server decides if callback applies)
          return self._resolveTypes(batchId);
        }).then(function(result) {
          self._showResolvingProgress = false;
          if (result.hadCallback) {
            self._resolvingDone = true;
          }

          // Step 3: Create folders
          return self._createFolders(result.resolvedItems, result.batchId);
        }).then(function(result) {
          // Step 4: Import files
          return self._importFiles(result.resolvedItems, result.batchId, result.pathToId);
        }).then(function() {
          self._showImportProgress = false;
          self._uploading = false;
          self._successMessage = self.i18n('folderDrop.success');
        }).catch(function(err) {
          console.error('[nuxeo-labs-folder-drop] Import failed:', err);
          self._showUploadProgress = false;
          self._showResolvingProgress = false;
          self._showImportProgress = false;
          self._uploading = false;
          self._errorMessage = self.i18n('folderDrop.error.importFailed');
          // Clean up the batch if it was created
          if (self._batchId) {
            self._deleteBatch(self._batchId);
          }
        });
      },

      /**
       * Deletes a batch to clean up uploaded files on error.
       */
      _deleteBatch: function(batchId) {
        this.$.nx.request().then(function(request) {
          request.path('/upload/' + batchId)
            .delete()
            .catch(function(e) {
              console.warn('[nuxeo-labs-folder-drop] Failed to clean up batch:', e);
            });
        });
      },

      /**
       * Detects if S3 direct upload is available.
       */
      _detectS3: function() {
        try {
          var config = Nuxeo.UI && Nuxeo.UI.config;
          if (config && config.s3 && config.s3.useDirectUpload === 'true') {
            return true;
          }
        } catch (e) {
          // ignore
        }
        return false;
      },

      /**
       * Uploads all files to a single batch.
       * Returns the batchId.
       * Uses S3 direct upload with parallel uploads when available,
       * otherwise falls back to sequential server-side upload.
       */
      _uploadFiles: function() {
        var self = this;
        var files = this._fileObjects;
        var totalFiles = files.length;

        if (totalFiles === 0) {
          return Promise.resolve(null);
        }

        this._useS3 = this._detectS3();

        if (this._useS3) {
          return this._uploadFilesS3(files, totalFiles);
        }
        return this._uploadFilesDefault(files, totalFiles);
      },

      /**
       * Sequential upload through Nuxeo server (default provider).
       */
      _uploadFilesDefault: function(files, totalFiles) {
        var self = this;
        this._showUploadProgress = true;
        this._uploadProgressValue = 0;
        this._uploadProgressMax = totalFiles;
        this._uploadProgressLabel = this.i18n('folderDrop.progress.uploading.count', '0', totalFiles.toString());

        return this.$.nx.batchUpload().then(function(uploader) {
          self._uploader = uploader;
          var batchId = null;

          var chain = Promise.resolve();
          var LARGE_FILE_THRESHOLD = 10 * 1024 * 1024; // 10 MB
          files.forEach(function(file, index) {
            chain = chain.then(function() {
              self._currentFileName = file.name;
              self._currentFileSize = self.formatSize(file.size);
              self._showFileIndeterminate = file.size > LARGE_FILE_THRESHOLD;

              var blob = new Nuxeo.Blob({ content: file });
              return uploader.upload(blob).then(function(result) {
                if (!batchId) {
                  batchId = result.batch._batchId;
                }
                self._items.forEach(function(item) {
                  if (!item.isFolder && item.fileIndex === index) {
                    item.batchFileIndex = result.blob.fileIdx;
                  }
                });
                self._uploadProgressValue = index + 1;
                self._uploadProgressLabel = self.i18n('folderDrop.progress.uploading.count',
                  (index + 1).toString(), totalFiles.toString());
                self._currentFileName = '';
                self._currentFileSize = '';
                self._showFileIndeterminate = false;
              });
            });
          });

          return chain.then(function() {
            return batchId;
          });
        });
      },

      /**
       * Parallel upload via S3 direct upload provider.
       * Concurrency limit = 5. Shows aggregate bytes progress + individual file progress.
       */
      _uploadFilesS3: function(files, totalFiles) {
        var self = this;

        // Calculate total bytes
        var totalBytes = 0;
        files.forEach(function(f) { totalBytes += f.size; });
        this._totalBytes = totalBytes;
        this._uploadedBytes = 0;

        this._showUploadProgress = true;
        this._uploadProgressValue = 0;
        this._uploadProgressMax = totalBytes || 1;
        this._uploadProgressLabel = this.i18n('folderDrop.progress.uploading.bytes',
          '0', this.formatSize(totalBytes));
        this._hasInFlightFiles = true;
        this._inFlightFiles = [];

        var CONCURRENCY = 5;

        // Per-file tracking for loaded bytes
        var perFileLoaded = new Array(totalFiles);
        for (var i = 0; i < totalFiles; i++) { perFileLoaded[i] = 0; }

        return this.$.nx.batchUpload().then(function(uploader) {
          self._uploader = uploader;
          var batchId = null;
          var completedCount = 0;
          var nextIndex = 0;

          // We must init the batch to get a batchId first
          return uploader.upload(new Nuxeo.Blob({ content: files[0] }), {
            onProgress: function(e) {
              self._updateS3FileProgress(0, files[0], e, perFileLoaded);
            }
          }).then(function(result) {
            batchId = result.batch._batchId;
            self._items.forEach(function(item) {
              if (!item.isFolder && item.fileIndex === 0) {
                item.batchFileIndex = result.blob.fileIdx;
              }
            });
            completedCount++;
            perFileLoaded[0] = files[0].size;
            self._updateS3AggregateProgress(perFileLoaded, totalBytes, completedCount, totalFiles);
            nextIndex = 1;

            // Now upload remaining files with concurrency
            return new Promise(function(resolve, reject) {
              var activeCount = 0;

              function startNext() {
                while (activeCount < CONCURRENCY && nextIndex < totalFiles) {
                  (function(idx) {
                    activeCount++;
                    var file = files[idx];
                    // Add to in-flight list
                    self._addInFlightFile(idx, file);

                    var blob = new Nuxeo.Blob({ content: file });
                    uploader.upload(blob, {
                      onProgress: function(e) {
                        self._updateS3FileProgress(idx, file, e, perFileLoaded);
                      }
                    }).then(function(res) {
                      self._items.forEach(function(item) {
                        if (!item.isFolder && item.fileIndex === idx) {
                          item.batchFileIndex = res.blob.fileIdx;
                        }
                      });
                      perFileLoaded[idx] = file.size;
                      completedCount++;
                      activeCount--;
                      self._updateS3AggregateProgress(perFileLoaded, totalBytes, completedCount, totalFiles);
                      self._removeInFlightFile(idx);
                      if (completedCount === totalFiles) {
                        resolve();
                      } else {
                        startNext();
                      }
                    }).catch(function(err) {
                      reject(err);
                    });
                  })(nextIndex);
                  nextIndex++;
                }
              }

              if (nextIndex >= totalFiles) {
                resolve();
              } else {
                startNext();
              }
            });
          }).then(function() {
            self._hasInFlightFiles = false;
            self._inFlightFiles = [];
            return batchId;
          });
        });
      },

      _addInFlightFile: function(idx, file) {
        var list = this._inFlightFiles.slice();
        list.push({
          idx: idx,
          name: file.name,
          sizeLabel: this.formatSize(file.size),
          pct: 0
        });
        this._inFlightFiles = list;
      },

      _removeInFlightFile: function(idx) {
        this._inFlightFiles = this._inFlightFiles.filter(function(f) { return f.idx !== idx; });
      },

      _updateS3FileProgress: function(idx, file, progressEvent, perFileLoaded) {
        if (progressEvent && progressEvent.loaded !== undefined) {
          perFileLoaded[idx] = progressEvent.loaded;
          var pct = file.size > 0 ? Math.round((progressEvent.loaded / file.size) * 100) : 100;

          // Update in-flight entry
          var list = this._inFlightFiles.slice();
          for (var i = 0; i < list.length; i++) {
            if (list[i].idx === idx) {
              list[i] = Object.assign({}, list[i], { pct: pct });
              break;
            }
          }
          this._inFlightFiles = list;
        }

        // Update aggregate
        var totalLoaded = 0;
        for (var j = 0; j < perFileLoaded.length; j++) {
          totalLoaded += perFileLoaded[j];
        }
        this._uploadedBytes = totalLoaded;
        this._uploadProgressValue = totalLoaded;
        this._uploadProgressLabel = this.i18n('folderDrop.progress.uploading.bytes',
          this.formatSize(totalLoaded), this.formatSize(this._totalBytes));
      },

      _updateS3AggregateProgress: function(perFileLoaded, totalBytes, completedCount, totalFiles) {
        var totalLoaded = 0;
        for (var j = 0; j < perFileLoaded.length; j++) {
          totalLoaded += perFileLoaded[j];
        }
        this._uploadedBytes = totalLoaded;
        this._uploadProgressValue = totalLoaded;
        this._uploadProgressLabel = this.i18n('folderDrop.progress.uploading.bytes',
          this.formatSize(totalLoaded), this.formatSize(totalBytes));
      },

      /**
       * Calls FolderDrop.ResolveTypes to get doc types for all items.
       * Returns { resolvedItems, batchId, hadCallback }.
       */
      _resolveTypes: function(batchId) {
        var self = this;

        // Build the tree JSON (strip fileIndex, keep batchFileIndex)
        var treeItems = this._items.map(function(item) {
          var obj = {
            name: item.name,
            relativePath: item.relativePath,
            isFolder: item.isFolder,
            mimeType: item.mimeType || '',
            size: item.size || 0
          };
          if (!item.isFolder && item.batchFileIndex !== undefined) {
            obj.batchFileIndex = item.batchFileIndex;
          }
          return obj;
        });

        // Show resolving spinner (indeterminate) — will only be meaningful with a callback chain,
        // but we always call the operation (it's fast without a chain)
        this._showResolvingProgress = true;

        var op = this.$.resolveTypesOp;
        op.params = {
          parentPath: this.document.path,
          treeJson: JSON.stringify(treeItems)
        };
        op.input = undefined;

        return op.execute().then(function(response) {
          if (response && typeof response.text === 'function') {
            return response.text();
          }
          return typeof response === 'string' ? response : JSON.stringify(response);
        }).then(function(text) {
          var resolvedItems = JSON.parse(text);
          // Determine if callback was used: if any file has a non-null docType, a callback was involved
          var hadCallback = resolvedItems.some(function(item) {
            return !item.isFolder && item.docType !== null && item.docType !== undefined;
          });
          return { resolvedItems: resolvedItems, batchId: batchId, hadCallback: hadCallback };
        });
      },

      /**
       * Creates folder documents top-down.
       * Maintains a map of relativePath -> document UUID for use by _importFiles.
       */
      _createFolders: function(resolvedItems, batchId) {
        var self = this;
        var folders = resolvedItems.filter(function(item) { return item.isFolder; });
        var files = resolvedItems.filter(function(item) { return !item.isFolder; });
        var totalDocs = folders.length + files.length;

        // Sort by depth (top-down)
        folders.sort(function(a, b) {
          return a.relativePath.split('/').length - b.relativePath.split('/').length;
        });

        this._showImportProgress = true;
        this._importProgressValue = 0;
        this._importProgressMax = totalDocs;
        this._importProgressLabel = this.i18n('folderDrop.progress.creatingDocs.count',
          '0', totalDocs.toString());

        // Map relativePath -> UUID for parent lookups
        var pathToId = {};
        pathToId[''] = this.document.uid;
        var created = 0;

        // Create folders sequentially (parent must exist before child)
        var chain = Promise.resolve();
        folders.forEach(function(folder) {
          chain = chain.then(function() {
            var parentRelPath = self._getParentRelativePath(folder.relativePath);
            var parentId = pathToId[parentRelPath];
            var docType = folder.docType || 'Folder';
            var name = folder.name;

            return self.$.nx.request().then(function(request) {
              return request.path('/id/' + parentId)
                .post({
                  body: {
                    'entity-type': 'document',
                    type: docType,
                    name: name,
                    properties: {
                      'dc:title': name
                    }
                  }
                });
            }).then(function(response) {
              // Store the UUID of the created folder for child lookups
              pathToId[folder.relativePath] = response.uid;
              created++;
              self._importProgressValue = created;
              self._importProgressLabel = self.i18n('folderDrop.progress.creatingDocs.count',
                created.toString(), totalDocs.toString());
            });
          });
        });

        return chain.then(function() {
          return { resolvedItems: resolvedItems, batchId: batchId, created: created, totalDocs: totalDocs, pathToId: pathToId };
        });
      },

      /**
       * Imports files. If docType is null, uses FileManager.Import.
       * Otherwise creates explicitly with the given type.
       * Uses pathToId map to look up parent document UUIDs.
       */
      _importFiles: function(resolvedItems, batchId, pathToId) {
        var self = this;
        var files = resolvedItems.filter(function(item) { return !item.isFolder; });
        var folders = resolvedItems.filter(function(item) { return item.isFolder; });
        var totalDocs = folders.length + files.length;

        if (files.length === 0 || !batchId) {
          return Promise.resolve();
        }

        var created = folders.length; // folders already done

        // Import files sequentially
        var chain = Promise.resolve();
        files.forEach(function(file) {
          chain = chain.then(function() {
            var parentRelPath = self._getParentRelativePath(file.relativePath);
            var parentId = pathToId[parentRelPath];
            var fileIdx = file.batchFileIndex !== undefined ? file.batchFileIndex : '0';

            var promise;
            if (file.docType) {
              // Explicit creation with specified doc type
              promise = self.$.nx.request().then(function(request) {
                return request.path('/id/' + parentId)
                  .post({
                    body: {
                      'entity-type': 'document',
                      type: file.docType,
                      name: file.name,
                      properties: {
                        'dc:title': file.name,
                        'file:content': {
                          'upload-batch': batchId,
                          'upload-fileId': String(fileIdx)
                        }
                      }
                    },
                    headers: {
                      'X-Batch-No-Drop': 'true'
                    }
                  });
              });
            } else {
              // Use FileManager.Import (default) — currentDocument accepts UUID
              promise = self.$.nx.request().then(function(request) {
                return request.path('/upload/' + batchId + '/' + fileIdx + '/execute/FileManager.Import')
                  .post({
                    body: {
                      params: {
                        context: {
                          currentDocument: parentId
                        }
                      },
                      context: {
                        currentDocument: parentId
                      }
                    },
                    headers: {
                      'X-Batch-No-Drop': 'true'
                    }
                  });
              });
            }

            return promise.then(function() {
              created++;
              self._importProgressValue = created;
              self._importProgressLabel = self.i18n('folderDrop.progress.creatingDocs.count',
                created.toString(), totalDocs.toString());
            });
          });
        });

        return chain;
      },

      /**
       * Given a relativePath like "folder1/subfolder/file.txt",
       * returns the parent's relativePath, e.g., "folder1/subfolder".
       * Returns '' for top-level items (no parent folder in the tree).
       */
      _getParentRelativePath: function(relativePath) {
        var parts = relativePath.split('/');
        // Remove the last part (the item name itself)
        parts.pop();
        return parts.join('/');
      }
    });
  </script>
</dom-module>
