<!-- Import the component -->
<link rel="import" href="nuxeo-labs-folder-drop.html">

<!--
  Register the "Drop Folder..." button in document actions.
  Only visible on Folderish documents.
-->
<nuxeo-slot-content name="folderDropAction" slot="DOCUMENT_ACTIONS" order="40">
  <template>
    <nuxeo-filter document="[[document]]" facet="Folderish">
      <template>
        <nuxeo-labs-folder-drop document="[[document]]"></nuxeo-labs-folder-drop>
      </template>
    </nuxeo-filter>
  </template>
</nuxeo-slot-content>
